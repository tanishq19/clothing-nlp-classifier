<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ item.Clothes_Title }}</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{{ item.Clothes_Title }}</h1>
    <p>{{ item.Clothes_Description }}</p>
    <h2>Reviews</h2>
    <ul>
    {% for review in reviews.itertuples() %}
        <li>{{ review.Title }} - {{ review.Review_Text }} (Rating: {{ review.Rating }}, Recommended: {{ review.Recommended_IND }})</li>
    {% endfor %}
    </ul>
    <a href="/add_review/{{ item.Clothing_ID }}">Add a Review</a>
</body>
</html>
