<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Review for {{ item['Clothes Title'] }}</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Back to Home Button -->
        <div class="navigation">
            <a href="{{ url_for('index') }}" class="btn">Back to Home</a>
        </div>

        <h1>Add Review for {{ item['Clothes Title'] }}</h1>
        <form action="" method="post">
            <label for="review_title">Title:</label><br>
            <input type="text" id="review_title" name="review_title" required><br>

            <label for="review_text">Review Text:</label><br>
            <textarea id="review_text" name="review_text" required></textarea><br>

            <label for="rating">Rating:</label><br>
            <input type="number" id="rating" name="rating" min="1" max="5" required><br>

            <button type="submit">Submit Review</button>
        </form>

        <a href="{{ url_for('clothing_details', item_id=item['Clothing ID']) }}">Back to Item</a>
    </div>
</body>
</html>
