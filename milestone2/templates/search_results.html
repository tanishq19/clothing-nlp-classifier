<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results for "{{ keyword }}"</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Back to Home Button -->
        <div class="navigation">
            <a href="{{ url_for('index') }}" class="btn">Back to Home</a>
        </div>

        <h1>Search Results for "{{ keyword }}"</h1>
        <p>{{ num_results }} items found</p>

        <ul>
            {% for index, item in results.iterrows() %}
            <li>
                <a href="{{ url_for('clothing_details', item_id=item['Clothing ID']) }}">
                    {{ item['Clothes Title'] }} - {{ item['Clothes Description'] }}
                </a>
            </li>
            {% endfor %}
        </ul>
        <a href="{{ url_for('index') }}">Back to Home</a>
    </div>
</body>
</html>
